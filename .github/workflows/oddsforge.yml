name: 🔥 OddsForge — Under 3.5 + Over 2.5

on:
  schedule:
    - cron: '0 12 * * *'   # 07:00 Colombia
    - cron: '0 15 * * *'   # 10:00 Colombia
    - cron: '0 17 * * *'   # 12:00 Colombia
    - cron: '0 19 * * *'   # 14:00 Colombia
    - cron: '0 22 * * *'   # 17:00 Colombia
    - cron: '0 1 * * *'    # 20:00 Colombia
    - cron: '0 4 * * *'    # 23:00 Colombia
    - cron: '0 7 * * *'    # 02:00 Colombia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  oddsforge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 Download historical data
        uses: actions/download-artifact@v4
        with:
          name: oddsforge-data
          path: bot_data/
        continue-on-error: true

      - name: 🔥 Run OddsForge Bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BANKROLL: ${{ secrets.BANKROLL }}
          SCORE_MINIMO: ${{ secrets.SCORE_MINIMO }}
          VALUE_BETTING_MIN: ${{ secrets.VALUE_BETTING_MIN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_STAKE: ${{ secrets.BASE_STAKE }}
        run: python main.py

      - name: 💾 Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddsforge-data
          path: bot_data/
          retention-days: 90
          overwrite: true
